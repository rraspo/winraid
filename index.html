<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP for Electron renderer.
      'unsafe-eval' is required by Vite HMR in dev; tighten in production
      by using electron-builder's extraFiles to swap in a stricter CSP header.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval';
        style-src   'self' 'unsafe-inline';
        font-src    'self' data:;
        img-src     'self' data:;
        connect-src 'self';
      "
    />
    <title>WinRaid</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
