name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Fast feedback: lint + full vitest suite on Linux. The suite is pure
  # logic/jsdom — no Electron binary is exercised — so it runs anywhere.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # Same suite on the OS the app actually ships on.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
